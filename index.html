<!DOCTYPE html>
<html>
<head>
  <title>Nameify</title>

  <!-- ✅ Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background-color: #333;
      color: white;
      cursor: pointer;
      width: 30%;
    }

    button:hover {
      background-color: #555;
    }

    .animate {
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    p {
      font-size: 14px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="text">Enter your name 👇</h1>

  <form onsubmit="showInput(); return false;">
    <input type="text" id="inputBox" placeholder="Type your name">

    <br><br>

    <button type="submit">Submit 👍</button>
    <button type="button" onclick="funnyName()">😂 Funny</button>
    <button type="button" onclick="stylishName()">😎 Style</button>
    <button type="button" onclick="pitchingline()">😊line</button>
  </form>

  <button onclick="clearName()">Reset 🔄</button>

  <p id="message"></p>

  <p>
    This website is made for fun 😄<br>
    Share it with your friends and enjoy 🎉
  </p>

</div>

<script>

// Greeting messages
function randomMessage(name) {
  let messages = [
    name + " is awesome 😎",
    name + " is a future developer 🚀",
    name + " looks great today ✨",
    "Hey " + name + ", keep shining 🔥"
  ];
  return messages[Math.floor(Math.random() * messages.length)];
}

// Submit
function showInput() {
  let userText = document.getElementById("inputBox").value;
  let text = document.getElementById("text");

  if (userText === "") {
    text.innerHTML = "Please enter your name";
  } else {
    text.innerHTML = "Hello, " + userText + " 😄";
    document.getElementById("message").innerHTML = randomMessage(userText);

    // Save name
    localStorage.setItem("name", userText);
  }

  animateText();
}

// Funny
function funnyName() {
  let name = document.getElementById("inputBox").value;

  if (name === "") {
    document.getElementById("text").innerHTML = "Enter your name first 😅";
    return;
  }

  let jokes = [
    "Hey " + name + ", are you WiFi? Because I'm feeling a connection 📶😂",
    "Hey " + name + ", are you pizza? Because I can’t resist you 🍕😂",
    name + ", you’re not lazy… just on energy-saving mode 😴😂",
    "Hey " + name + ", are you Google? Because you have everything I’m searching for 🤓😂",
    "Hey " + name + ", are you fries? Because I want you with everything 🍟😂"
  ];

  let random = jokes[Math.floor(Math.random() * jokes.length)];

  document.getElementById("text").innerHTML = random;

  animateText();
}


// Stylish
function stylishName() {
  let name = document.getElementById("inputBox").value;
  if (name === "") return;

  document.getElementById("text").innerHTML =  "Hey " + name.toUpperCase() + " 😎, you don’t need filters… you’re already premium ✨"
  animateText();
}

//line
function pitchingline() {
let name = document.getElementById("inputBox").value;
if (name === "") return;

document.getElementById("text").innerHTML = " hey " + name + " are you a coffee ? because you are so hot and sweet 😋 ";
animateText();
}

// Reset
function clearName() {
  localStorage.removeItem("name");
  document.getElementById("text").innerHTML = "Enter your name 👇";
  document.getElementById("message").innerHTML = "";
  document.getElementById("inputBox").value = "";
}

// Animation
function animateText() {
  let text = document.getElementById("text");
  text.classList.remove("animate");
  void text.offsetWidth;
  text.classList.add("animate");
}

</script>

</body>
</html>
